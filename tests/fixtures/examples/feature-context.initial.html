<h1>Context / Provider-Inject</h1><p>This example demonstrates a theme Cell provided at the root and injected 4 levels deep, with automatic re-rendering on change.</p><div id="App"><div class="App app theme-light"><div class="controls"><button>Light</button><button>Dark</button><button>Warm</button></div><h2>Application Root</h2><div><div class="Layout layout"><div class="label">Layout</div><div><div class="Panel panel"><div class="label">Panel</div><div><button class="ThemedButton button"><span>Click Me (theme: unknown)</span></button></div></div></div></div></div></div></div><template id="App"><div class="app theme-light" out:class="themeClass"><div class="controls"><button on:click="setLight">Light</button><button on:click="setDark">Dark</button><button on:click="setWarm">Warm</button></div><h2>Application Root</h2><div out="layout"></div></div></template><template id="Layout"><div class="layout"><div class="label">Layout</div><div out="panel"></div></div></template><template id="Panel"><div class="panel"><div class="label">Panel</div><div out="button"></div></div></template><template id="ThemedButton"><button class="button" on:click=""><span out="label">Button</span></button></template>
