<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<title>Select UI ― JavaScript Module</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script type="importmap">
		{"imports": {"@./": "../src/js/" } }
	</script>
	<style>
		body {
			font-family: system-ui, sans-serif;
			padding: 20px;
			max-width: 800px;
			margin: 0 auto;
		}

		#ui {
			border: 1px solid #ddd;
			border-radius: 8px;
			padding: 16px;
			background: #fff;
		}

		.module-demo {
			display: grid;
			gap: 12px;
		}

		.module-demo h3 {
			margin: 0;
		}

		.module-demo p {
			margin: 0;
		}

		.module-demo code {
			background: #f3f3f3;
			padding: 2px 6px;
			border-radius: 3px;
		}

		.module-demo button {
			justify-self: start;
			padding: 6px 10px;
			border: 1px solid #ccc;
			border-radius: 4px;
			background: white;
			cursor: pointer;
		}

		.module-demo button:hover {
			background: #f5f5f5;
		}
	</style>
</head>

<body>
	<h1>JavaScript Module Components</h1>
	<p>This example builds a component directly from a JavaScript template string and updates it without any HTML <code>&lt;template&gt;</code> block.</p>

	<div id="ui"></div>

	<script type="module">
		import ui from "@./select.ui.js"

		const messages = [
			"Hello, World!",
			"Welcome to Select UI",
			"Pure JavaScript component rendering",
			"State updates are reactive"
		]

		const ModuleComponent = ui(`<section class="module-demo">
			<h3 out="title">Module Demo</h3>
			<p out="message"><em>No message</em></p>
			<p>Current index: <code out="index">0</code></p>
			<button on:click="next">Next Message</button>
		</section>`).does({
			title: (self, {title}) => title,
			message: (self, {index}) => messages[index % messages.length],
			index: (self, {index}) => index,
			next: (self, {index}) => self.update({index: (index + 1) % messages.length}),
		})

		ModuleComponent.new().set({
			title: "Runtime Template",
			index: 0,
		}).mount("#ui")
	</script>
</body>

</html>
