<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Select UI ― Color Picker (Cells)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="importmap">
      {"imports": {"@./": "../src/js/" } }
    </script>
    <style>
      body {
      	font-family: system-ui, sans-serif;
      	padding: 20px;
      	max-width: 800px;
      	margin: 0 auto;
      }

      #ui {
      	border: 1px solid #ddd;
      	border-radius: 8px;
      	padding: 16px;
      	background: #fff;
      }

      .picker {
      	display: flex;
      	gap: 16px;
      	align-items: flex-start;
      	flex-wrap: wrap;
      }

      .swatch {
	      width: 96px;
	      height: 96px;
	      border: 1px solid #222;
	      border-radius: 8px;
	      flex: 0 0 auto;
	      cursor: pointer;
	      transition: transform 120ms ease;
	    }

	    .swatch:hover {
	      transform: scale(1.03);
	    }

	    .swatch:active {
	      transform: scale(0.98);
	    }

	    .native-picker {
	      position: absolute;
	      width: 1px;
	      height: 1px;
	      margin: -1px;
	      border: 0;
	      padding: 0;
	      clip: rect(0 0 0 0);
	      overflow: hidden;
	      white-space: nowrap;
	    }

      .channels {
	      flex: 1;
	      min-width: 220px;
	      display: grid;
	      gap: 10px;
      }

      .channel {
	      display: grid;
	      grid-template-columns: 56px minmax(140px, 1fr) 72px;
	      gap: 10px;
	      align-items: center;
      }

      .channel label {
	      font-weight: 600;
	      color: #1f2937;
      }

      .channel input[type="range"] {
	      width: 100%;
	      accent-color: #2563eb;
	      margin: 0;
	      height: 1.2rem;
	    }

	    .channel input[type="text"] {
	      width: 100%;
	      box-sizing: border-box;
	      border: 1px solid #cbd5e1;
	      border-radius: 6px;
	      padding: 6px 8px;
	      font: 600 0.9rem/1.2 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
	      text-align: right;
	      color: #0f172a;
	      background: #f8fafc;
	    }

	    .channel input[type="text"]:focus {
	      outline: 2px solid #93c5fd;
	      outline-offset: 1px;
	      border-color: #60a5fa;
	    }

	    @media (max-width: 560px) {
	      .channel {
	      	grid-template-columns: 44px 1fr 64px;
	      	gap: 8px;
	      }
	    }
    </style>
  </head>
  <body>
    <h1>Color Picker</h1>
    <p>This app example uses shared cells and a derived value to keep RGB sliders and swatch color in sync.</p>
    <div id="ui">
    </div>
    <template id="ColorComponent">
      <div class="channel">
        <label out="label">Component</label>
        <input inout="value" type="range" min="0" max="255" />
        <input inout="value" type="text" inputmode="numeric" pattern="[0-9]*" />
      </div>
    </template>
    <template id="ColorPicker">
      <div class="picker">
        <div out="color" class="swatch" ref="swatch" on:click="pick"></div>
        <input class="native-picker" ref="nativePicker" type="color" on:input="pickColor" />
        <div class="channels">
          <div out="red"></div>
          <div out="green"></div>
          <div out="blue"></div>
        </div>
      </div>
    </template>
    <script type="module">
      import cell, {derived} from "@./select.cells.js"
      import ui from "@./select.ui.js"

	  const clamp255 = (value) => {
	  	const n = Number(value)
	  	if (!Number.isFinite(n)) {
	  		return 0
	  	}
	  	return Math.max(0, Math.min(255, Math.round(n)))
	  }

	  const toHex = (value) => clamp255(value).toString(16).padStart(2, "0")

	  const rgbToHex = (red, green, blue) => `#${toHex(red)}${toHex(green)}${toHex(blue)}`

	  const hexToRgb = (hex) => {
	  	const parsed = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex || "")
	  	if (!parsed) {
	  		return null
	  	}
	  	return [
	  		parseInt(parsed[1], 16),
	  		parseInt(parsed[2], 16),
	  		parseInt(parsed[3], 16),
	  	]
	  }

      const ColorComponent = ui("#ColorComponent").does({
	      label: (_self, {label}) => label,
	      value: (_self, {value}, event) => {
	      	if (event) {
	      		return clamp255(event.target.value)
	      	}
	      	return clamp255(value?.isReactive ? value.value : value)
	      },
      })

      const ColorPicker = ui("#ColorPicker").init(() => {
      	const red = cell(100);
      	const green = cell(130);
      	const blue = cell(10);
      	const color = derived([red, green, blue], (red, green, blue) => {
      		return `rgb(${red},${green},${blue})`;
      	})
      	return {red, green, blue, color}
      }).does({
      	// TODO: If we were able to keep track of what is used, we could only
      	// re-trigger the behaviors that have changed.
	      red: (_, data) => ColorComponent({
	      	value: data.red,
	      	label: "Red"
	      }),
	      green: (_, {green}) => ColorComponent({
	      	value: green,
	      	label: "Green"
	      }),
	      blue: (_, {blue}) => ColorComponent({
	      	value: blue,
	      	label: "Blue"
	      }),
	      pick: (self, {red, green, blue}) => {
	      	const picker = self.ref.nativePicker
	      	picker.value = rgbToHex(red.value, green.value, blue.value)
	      	picker.click()
	      },
	      pickColor: (_self, {red, green, blue}, event) => {
	      	const rgb = hexToRgb(event?.target?.value)
	      	if (!rgb) {
	      		return
	      	}
	      	red.set(rgb[0])
	      	green.set(rgb[1])
	      	blue.set(rgb[2])
	      },
	      color: (self, {color, red, green, blue}) => {
	      	self.ref.swatch.style.backgroundColor = color.value;
	      	const picker = self.ref.nativePicker
	      	if (picker) {
	      		picker.value = rgbToHex(
	      			red.value,
	      			green.value,
	      			blue.value,
	      		)
	      	}
	      }
      })

      ColorPicker.new().mount("#ui")
    </script>
  </body>
</html>
