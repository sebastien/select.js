<h1>Todo List</h1><p>This app example shows list rendering, inline editing, and child-to-parent events with <code>send()</code>.</p><div id="Todo"><ul class="TodoList"><li class="TodoItem"><div><span>Buy wine</span><button>Edit</button><button>Remove</button></div><!--data.edited--></li></ul><button class="TodoList">Add</button></div><template id="TodoItem"><li><div when="!data.edited"><span out="label">Placeholder</span><button on:click="edit">Edit</button><button on:click="remove">Remove</button></div><div when="data.edited"><input in="editedLabel"><button on:click="save">Save</button><a href="#" on:click="cancel">cancel</a></div></li></template><template id="TodoList"><ul out="items"><li>Empty</li></ul><button on:click="add">Add</button></template>
