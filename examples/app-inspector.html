<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<title>Select UI ― Data Inspector</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script type="importmap">
		{"imports": {"@./": "../src/js/" } }
	</script>
	<style>
		body {
			font-family: system-ui, sans-serif;
			padding: 20px;
			max-width: 900px;
			margin: 0 auto;
		}

		#ui {
			border: 1px solid #ddd;
			border-radius: 8px;
			padding: 16px;
			background: #fff;
		}

		details {
			margin: 6px 0;
			padding: 6px 10px;
			border: 1px solid #e5e5e5;
			border-radius: 6px;
			background: #fafafa;
		}

		summary {
			cursor: pointer;
			font-weight: 600;
		}

		ul {
			margin: 8px 0 0;
			padding-left: 20px;
		}

		li {
			margin: 4px 0;
		}

		code {
			background: #f3f3f3;
			padding: 2px 6px;
			border-radius: 3px;
		}

		em {
			color: #666;
			font-style: normal;
			font-weight: 600;
			margin-right: 6px;
		}
	</style>
</head>

<body>
	<h1>Data Inspector</h1>
	<p>This app example recursively renders structured JSON values with typed components for lists, dictionaries, strings, numbers, and symbols.</p>

	<div id="ui"></div>

	<template id="InspectObject">
		<span><em>Object</em><code out="value"></code></span>
	</template>

	<template id="InspectSymbol">
		<span><em>Symbol</em><code out="value"></code></span>
	</template>

	<template id="InspectNumber">
		<span><em>Number</em><code out="value"></code></span>
	</template>

	<template id="InspectString">
		<span><em>String</em><span out="value"></span></span>
	</template>

	<template id="InspectList">
		<details>
			<summary>List (<span out="count"></span>)</summary>
			<ul out="items">
				<li>Empty</li>
			</ul>
		</details>
	</template>

	<template id="Item">
		<li>
			<code out="key"></code>
			<span out="value"></span>
		</li>
	</template>

	<template id="InspectDict">
		<details>
			<summary>Dict (<span out="count"></span>)</summary>
			<ul out="items">
				<li>Empty</li>
			</ul>
		</details>
	</template>

	<template id="Inspector">
		<ul out="items">
			<li>Empty</li>
		</ul>
	</template>

	<script type="module">
		import {ui, type, remap, len} from "@./select.ui.js"

		const inspect = (value) => {
			const t = type(value)
			switch (t) {
				case type.List:
					return InspectList({value})
				case type.Dict:
					return InspectDict({value})
				case type.String:
					return InspectString({value})
				case type.Number:
					return InspectNumber({value})
				case type.Boolean:
				case type.Null:
					return InspectSymbol({value})
				default:
					return InspectObject({value})
			}
		}

		const behavior = {
			count: (self, {value}) => len(value),
			value: (self, {value}) => value,
			items: (self, {value}) => remap(value, (value, key) => Item({key, value})),
		}

		const Item = ui("#Item").does({
			key: (self, {key}) => key,
			value: (self, {value}) => inspect(value),
		})

		const InspectDict = ui("#InspectDict").does({...behavior})
		const InspectList = ui("#InspectList").does({...behavior})
		const InspectString = ui("#InspectString").does({...behavior})
		const InspectNumber = ui("#InspectNumber").does({...behavior})
		const InspectSymbol = ui("#InspectSymbol").does({...behavior})
		const Inspector = ui("#Inspector").does({...behavior})

		const data = await fetch("./app-inspector.json").then(_ => _.json())
		Inspector.new().set({value: data}).mount("#ui")
	</script>
</body>

</html>
