<h1>Scoped Events</h1><p>This example demonstrates <code>emit()</code>, <code>on()</code>, and <code>off()</code> for runtime event subscriptions alongside template-time <code>.sub()</code>.</p><div id="App"><div class="App"><div class="controls"><button>Add Counter</button><button>Clear Log</button></div><div><div class="Counter counter"><button>−</button><span class="value">5</span><button>+</button></div><div class="Counter counter"><button>−</button><span class="value">3</span><button>+</button></div><div class="Counter counter"><button>−</button><span class="value">0</span><button>+</button></div></div><h3>Event Log</h3><div class="event-log"></div></div></div><template id="Counter"><div class="counter"><button on:click="decrement">−</button><span class="value" out="count">0</span><button on:click="increment">+</button></div></template><template id="App"><div><div class="controls"><button on:click="addCounter">Add Counter</button><button on:click="clearLog">Clear Log</button></div><div out="counters"></div><h3>Event Log</h3><div class="event-log" out="log"></div></div></template>
