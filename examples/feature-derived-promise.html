<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<title>Select UI — Derived Promise Feature</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script type="importmap">
		{"imports": {"@./": "../src/js/" } }
	</script>
	<style>
		body {
			font-family: system-ui, sans-serif;
			padding: 20px;
			max-width: 760px;
			margin: 0 auto;
		}

		#ui {
			border: 1px solid #ddd;
			border-radius: 8px;
			padding: 16px;
			background: #fff;
		}

		label {
			display: block;
			font-weight: 700;
			margin-bottom: 8px;
		}

		input {
			width: 100%;
			padding: 8px;
			font: inherit;
			margin-bottom: 10px;
			box-sizing: border-box;
		}

		.status {
			display: inline-block;
			padding: 3px 8px;
			border-radius: 10px;
			font-size: 12px;
			font-weight: 700;
			background: #e9f2ff;
			color: #245;
		}

		.status.ready {
			background: #e7f6ea;
			color: #163;
		}

		.row {
			margin-top: 10px;
		}

		code {
			background: #f2f2f2;
			padding: 2px 4px;
			border-radius: 4px;
		}
	</style>
</head>

<body>
	<h1>Derived Promise Feature</h1>
	<p>This feature demo shows a derived cell that returns a promise. The UI renders while pending, then re-renders on fulfillment, and exposes <code>.previous</code> and <code>.isPending</code>.</p>

	<div id="ui"></div>

	<template id="App">
		<div>
			<label>Search term</label>
			<input inout="query" type="text" placeholder="Type to trigger async derived value" />
			<div class="row">State: <span out:class="stateClass" out:text="stateLabel" class="status">pending</span></div>
			<div class="row">Current value: <code out="currentValue"></code></div>
			<div class="row">Previous value: <code out="previousValue"></code></div>
		</div>
	</template>

	<script type="module">
		import {cell, derived} from "@./select.cells.js"
		import ui from "@./select.ui.js"

		const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms))

		const App = ui("#App").init(() => {
			const query = cell("select")
			const result = derived([query], async (value) => {
				const text = `${value ?? ""}`.trim()
				const delay = text.length < 4 ? 600 : 250
				await wait(delay)
				return text ? `Result for "${text}" at ${new Date().toLocaleTimeString()}` : "No query"
			})
			return {query, result}
		}).does({
			query: (_self, {query}, event) => event ? query.set(event.target.value) : query.value,
			stateClass: (_self, {result}) => ({status: true, ready: !result.isPending}),
			stateLabel: (_self, {result}) => result.isPending ? "pending" : "fulfilled",
			currentValue: (_self, {result}) =>
				result.isPending
					? "[Promise pending]"
					: (result.value ?? "none"),
			previousValue: (_self, {result}) =>
				result.previous === undefined
					? "none"
					: (result.previous && typeof result.previous.then === "function")
						? "[Promise]"
						: result.previous,
		})

		App.new().mount("#ui")
	</script>
</body>

</html>
