<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<title>Select UI — Derived Promise Feature</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script type="importmap">
		{"imports": {"@./": "../src/js/select/" } }
	</script>
	<style>
		body {
			font-family: system-ui, sans-serif;
			padding: 20px;
			max-width: 980px;
			margin: 0 auto;
		}

		#ui {
			border: 1px solid #ddd;
			border-radius: 8px;
			padding: 16px;
			background: #fff;
		}

		label {
			display: block;
			font-weight: 700;
			margin-bottom: 8px;
		}

		input {
			width: 100%;
			padding: 8px;
			font: inherit;
			margin-bottom: 10px;
			box-sizing: border-box;
		}

		.status {
			display: inline-block;
			padding: 3px 8px;
			border-radius: 10px;
			font-size: 12px;
			font-weight: 700;
			background: #e9f2ff;
			color: #245;
		}

		.status.ready {
			background: #e7f6ea;
			color: #163;
		}

		.row {
			margin-top: 10px;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
			gap: 12px;
			margin-top: 12px;
		}

		.card {
			border: 1px solid #ddd;
			border-radius: 8px;
			padding: 10px;
			background: #fafafa;
		}

		.card h2 {
			margin: 0 0 8px 0;
			font-size: 16px;
		}

		code {
			background: #f2f2f2;
			padding: 2px 4px;
			border-radius: 4px;
		}
	</style>
</head>

<body>
	<h1>Derived Promise Feature</h1>
	<p>This feature demo compares derived promise update strategies: <code>join</code>, <code>incremental</code>, and <code>immediate</code>.</p>

	<div id="ui"></div>

	<template id="App">
		<div>
			<label>Search term</label>
			<input inout="query" type="text" placeholder="Type to compare derived update strategies" />
			<div class="grid">
				<div class="card">
					<h2>join (default)</h2>
					<div class="row">State: <span out:class="joinStateClass" out="joinStateLabel" class="status">pending</span></div>
					<div class="row">Current value: <code out="joinCurrentValue"></code></div>
					<div class="row">Previous value: <code out="joinPreviousValue"></code></div>
				</div>
				<div class="card">
					<h2>incremental</h2>
					<div class="row">State: <span out:class="incrementalStateClass" out="incrementalStateLabel" class="status">pending</span></div>
					<div class="row">Current value: <code out="incrementalCurrentValue"></code></div>
					<div class="row">Previous value: <code out="incrementalPreviousValue"></code></div>
				</div>
				<div class="card">
					<h2>immediate</h2>
					<div class="row">State: <span out:class="immediateStateClass" out="immediateStateLabel" class="status">pending</span></div>
					<div class="row">Current value: <code out="immediateCurrentValue"></code></div>
					<div class="row">Previous value: <code out="immediatePreviousValue"></code></div>
				</div>
			</div>
		</div>
	</template>

	<script type="module">
		import {cell, derived} from "@./cells.js"
		import ui from "@./ui.js"

		const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms))
		const renderStateClass = (derivedCell) => ({status: true, ready: !derivedCell.isPending})
		const renderStateLabel = (derivedCell) => derivedCell.isPending ? "pending" : "fulfilled"
		const renderCurrentValue = (derivedCell) =>
			derivedCell.isPending
				? "[Promise pending]"
				: (derivedCell.value ?? "none")
		const renderPreviousValue = (derivedCell) =>
			derivedCell.previous === undefined
				? "none"
				: (derivedCell.previous && typeof derivedCell.previous.then === "function")
					? "[Promise]"
					: derivedCell.previous

		const App = ui("#App").init(() => {
			const query = cell("select")
			const resolveResult = async (value) => {
				const text = `${value ?? ""}`.trim()
				const delay = text.length < 4 ? 600 : 250
				await wait(delay)
				return text ? `Result for "${text}" at ${new Date().toLocaleTimeString()}` : "No query"
			}
			const join = derived([query], resolveResult)
			const incremental = derived([query], resolveResult, "incremental")
			const immediate = derived([query], resolveResult, "immediate")
			return {query, join, incremental, immediate}
		}).does({
			query: (_self, {query}, event) => event ? query.set(event.target.value) : query.value,
			joinStateClass: (_self, {join}) => renderStateClass(join),
			joinStateLabel: (_self, {join}) => renderStateLabel(join),
			joinCurrentValue: (_self, {join}) => renderCurrentValue(join),
			joinPreviousValue: (_self, {join}) => renderPreviousValue(join),
			incrementalStateClass: (_self, {incremental}) => renderStateClass(incremental),
			incrementalStateLabel: (_self, {incremental}) => renderStateLabel(incremental),
			incrementalCurrentValue: (_self, {incremental}) => renderCurrentValue(incremental),
			incrementalPreviousValue: (_self, {incremental}) => renderPreviousValue(incremental),
			immediateStateClass: (_self, {immediate}) => renderStateClass(immediate),
			immediateStateLabel: (_self, {immediate}) => renderStateLabel(immediate),
			immediateCurrentValue: (_self, {immediate}) => renderCurrentValue(immediate),
			immediatePreviousValue: (_self, {immediate}) => renderPreviousValue(immediate),
		})

		App.new().mount("#ui")
	</script>
</body>

</html>
