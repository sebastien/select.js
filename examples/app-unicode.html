<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<title>Select UI ― Unicode Viewer</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script type="importmap">
		{"imports": {"@./": "../src/js/" } }
	</script>
	<style>
		body {
			font-family: system-ui, sans-serif;
			padding: 20px;
			max-width: 1100px;
			margin: 0 auto;
		}

		#ui {
			border: 1px solid #ddd;
			border-radius: 8px;
			padding: 12px;
			background: #fff;
		}

		.frame {
			display: grid;
			grid-template-columns: 300px 1fr;
			height: 70vh;
			min-height: 520px;
			border: 1px solid #ddd;
			border-radius: 8px;
			overflow: hidden;
			background: #fff;
		}

		.sidebar {
			display: grid;
			grid-template-rows: auto auto 1fr;
			gap: 10px;
			padding: 12px;
			border-right: 1px solid #e5e5e5;
			background: #fafafa;
			min-height: 0;
		}

		.sidebar h2 {
			margin: 0;
			font-size: 0.95rem;
			color: #333;
		}

		.sidebar input {
			border: 1px solid #ccc;
			border-radius: 4px;
			padding: 8px 10px;
			font: inherit;
		}

		.sidebar input:focus {
			outline: 2px solid #bfd7ff;
			outline-offset: 1px;
			border-color: #79a6ff;
		}

		.block-list {
			overflow-y: auto;
			overflow-x: hidden;
			display: grid;
			gap: 2px;
			padding-right: 4px;
			min-height: 0;
		}

		.block-item {
			border: 1px solid transparent;
			background: transparent;
			border-radius: 6px;
			padding: 4px 6px;
			text-align: left;
			cursor: pointer;
			display: grid;
			gap: 1px;
			transition: background-color 120ms ease;
		}

		.block-item:hover {
			border-color: #ddd;
			background: #f5f5f5;
		}

		.block-item.selected {
			border-color: #7aa2ff;
			background: #eef4ff;
		}

		.block-item:focus-visible {
			outline: 2px solid #bfd7ff;
			outline-offset: 1px;
		}

		.block-name {
			font-weight: 600;
			font-size: 0.83rem;
			line-height: 1.2;
		}

		.block-range {
			font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
			font-size: 0.67rem;
			color: #666;
		}

		.viewer {
			display: grid;
			grid-template-rows: auto 1fr;
			overflow: hidden;
			min-height: 0;
		}

		.viewer-head {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
			padding: 12px 16px;
			border-bottom: 1px solid #e5e5e5;
			background: #fff;
		}

		.current-block {
			font-weight: 650;
		}

		.current-meta {
			font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
			font-size: 0.8rem;
			color: #666;
			background: #f3f3f3;
			padding: 4px 8px;
			border-radius: 4px;
		}

		.status {
			color: #256b2a;
			font-size: 0.86rem;
			font-weight: 600;
			min-height: 1em;
		}

		.grid-pane {
			overflow: auto;
			padding: 14px;
			background: #fff;
			min-height: 0;
		}

		.block-section {
			margin-bottom: 18px;
		}

		.block-section h3 {
			margin: 0 0 4px;
			font-size: 0.95rem;
		}

		.block-section-meta {
			margin: 0 0 8px;
			font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
			font-size: 0.73rem;
			color: #666;
		}

		.char-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
			gap: 8px;
		}

		.char-cell {
			height: 72px;
			border: 1px solid #ddd;
			border-radius: 6px;
			padding: 6px;
			background: #fff;
			display: grid;
			grid-template-rows: 1fr auto;
			align-items: center;
			justify-items: center;
			cursor: copy;
			transition: border-color 110ms ease;
		}

		.char-cell:hover {
			border-color: #aaa;
			background: #fafafa;
		}

		.char-cell:focus-visible {
			outline: 2px solid #bfd7ff;
			outline-offset: 2px;
		}

		.char-glyph {
			font-size: 1.35rem;
			line-height: 1;
		}

		.char-code {
			font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
			font-size: 0.62rem;
			color: #666;
		}

		.empty {
			margin: 12px;
			padding: 10px 12px;
			border: 1px dashed #ccc;
			border-radius: 6px;
			background: #fff;
			color: #666;
		}

		@media (max-width: 920px) {
			.frame {
				grid-template-columns: 1fr;
				grid-template-rows: 260px 1fr;
				height: 75vh;
			}

			.sidebar {
				border-right: none;
				border-bottom: 1px solid #e5e5e5;
			}
		}
	</style>
</head>

<body>
	<h1>Unicode Viewer</h1>
	<p>This app example shows a two-pane unicode browser with block navigation, character grid rendering, and click-to-copy clipboard support.</p>
	<div id="ui"></div>

	<template id="BlockItem">
		<button class="block-item" out:class="classes" out:data-block-start="start" on:click="selectBlock" out:aria-label="ariaLabel">
			<span class="block-name" out="name">Block Name</span>
			<span class="block-range" out="range">U+0000..U+00FF</span>
		</button>
	</template>

	<template id="CharCell">
		<button class="char-cell" on:click="copy" out:title="title" out:aria-label="title">
			<span class="char-glyph" out="char">A</span>
			<span class="char-code" out="code">U+0041</span>
		</button>
	</template>

	<template id="BlockSection">
		<section class="block-section" out:data-segment-index="segmentIndex" out:data-segment-start="segmentStart" out:data-block-start="blockStart">
			<h3 out="heading">Basic Latin</h3>
			<p class="block-section-meta" out="range">U+0000..U+007F</p>
			<div class="char-grid" out="chars">
				<div class="empty">No characters in this range</div>
			</div>
		</section>
	</template>

	<template id="UnicodeApp">
		<div class="frame">
			<aside class="sidebar">
				<h2>Unicode Blocks</h2>
				<input inout="query" placeholder="Search block" aria-label="Search unicode blocks" />
				<div class="block-list" ref="blockList" out="blockItems">
					<div class="empty">No blocks</div>
				</div>
			</aside>
			<section class="viewer">
				<header class="viewer-head">
					<div>
						<div class="current-block" out="activeBlockName">-</div>
						<div class="current-meta" out="activeBlockRange">U+0000..U+0000</div>
					</div>
					<div class="status" out="status"></div>
				</header>
				<div class="grid-pane" ref="grid" on:scroll="onGridScroll">
					<div out="sections">
						<div class="empty">No characters in this block</div>
					</div>
				</div>
			</section>
		</div>
	</template>

		const parseBlocks = (text) => {
			const lines = text.trim().split("\n")
			const blocks = []
			for (let i = 0; i < lines.length; i++) {
				const line = lines[i].trim()
				if (!line || line.startsWith("#")) {
					continue
				}
				const split = line.split(";")
				if (split.length < 2) {
					continue
				}
				const range = split[0].trim().split("..")
				if (range.length < 2) {
					continue
				}
				const start = parseInt(range[0], 16)
				const end = parseInt(range[1], 16)
				if (Number.isNaN(start) || Number.isNaN(end)) {
					continue
				}
				blocks.push({
					name: split[1].trim(),
					start,
					end,
				})
			}
			return blocks
		}

		const BLOCKS = parseBlocks(BLOCKS_TEXT)
		const SEGMENT_SIZE = 256
		const INITIAL_SECTIONS = 6
		const LOAD_STEP = 4

		const toCode = (cp) => `U+${cp.toString(16).toUpperCase().padStart(cp > 0xffff ? 5 : 4, "0")}`

		const toRange = (start, end) => `${toCode(start)}..${toCode(end)}`

		const escapeChar = (char) => {
			if (char === " ") return "SPACE"
			if (char === "\t") return "TAB"
			if (char === "\n") return "LF"
			if (char === "\r") return "CR"
			return char
		}

		const findBlock = (blocks, selectedStart) => {
			for (let i = 0; i < blocks.length; i++) {
				if (blocks[i].start === selectedStart) {
					return blocks[i]
				}
			}
			return blocks[0]
		}

		const filterBlocks = (blocks, query) => {
			const q = (query || "").trim().toLowerCase()
			if (!q) {
				return blocks
			}
			const result = []
			for (let i = 0; i < blocks.length; i++) {
				const b = blocks[i]
				if (b.name.toLowerCase().includes(q)) {
					result.push(b)
				}
			}
			return result
		}

		const buildSegments = (blocks, size) => {
			const segments = []
			for (let i = 0; i < blocks.length; i++) {
				const block = blocks[i]
				for (let start = block.start; start <= block.end; start += size) {
					const end = Math.min(block.end, start + size - 1)
					segments.push({
						name: block.name,
						blockStart: block.start,
						blockEnd: block.end,
						start,
						end,
					})
				}
			}
			return segments
		}

		const SEGMENTS = buildSegments(BLOCKS, SEGMENT_SIZE)

		const filterSegments = (segments, query) => {
			const q = (query || "").trim().toLowerCase()
			if (!q) {
				return segments
			}
			const result = []
			for (let i = 0; i < segments.length; i++) {
				const s = segments[i]
				if (s.name.toLowerCase().includes(q)) {
					result.push(s)
				}
			}
			return result
		}

		const indexOfSegment = (segments, start) => {
			for (let i = 0; i < segments.length; i++) {
				if (segments[i].start === start) {
					return i
				}
			}
			return 0
		}

		const firstSegmentForBlock = (segments, blockStart) => {
			for (let i = 0; i < segments.length; i++) {
				if (segments[i].blockStart === blockStart) {
					return segments[i]
				}
			}
			return segments[0]
		}

		const BlockItem = ui("#BlockItem").does({
			name: (_self, { name }) => name,
			range: (_self, { start, end }) => toRange(start, end),
			start: (_self, { start }) => start,
			classes: (_self, { selected }) => ({ selected }),
			ariaLabel: (_self, { name, start, end }) => `${name}, ${toRange(start, end)}`,
			selectBlock: (self, data) => self.send("SelectBlock", data),
		})

		const CharCell = ui("#CharCell").does({
			char: (_self, { char }) => escapeChar(char),
			code: (_self, { code }) => code,
			title: (_self, { code, name }) => `${code} - ${name}`,
			copy: (self, data) => self.send("CopyChar", data),
		})

		const BlockSection = ui("#BlockSection").does({
			heading: (_self, { name }) => name,
			range: (_self, { start, end, blockStart, blockEnd }) => {
				const chunk = end - start + 1
				if (start === blockStart && end === blockEnd) {
					return `${toRange(start, end)} (${chunk} chars)`
				}
				return `${toRange(start, end)} (${chunk} chars, segment)`
			},
			segmentIndex: (_self, { index }) => index,
			segmentStart: (_self, { start }) => start,
			blockStart: (_self, { blockStart }) => blockStart,
			chars: (_self, { start, end, name }) => {
				const count = end - start + 1
				const cells = new Array(count)
				for (let i = 0; i < count; i++) {
					const cp = start + i
					cells[i] = CharCell({
						cp,
						char: String.fromCodePoint(cp),
						code: toCode(cp),
						name,
					})
				}
				return cells
			},
		})

		const UnicodeApp = ui("#UnicodeApp").init(() => ({
			blocks: BLOCKS,
			segments: SEGMENTS,
			selectedStart: BLOCKS[0]?.start,
			query: "",
			visibleSections: INITIAL_SECTIONS,
			syncPaused: false,
			status: "",
			statusTick: 0,
		})).does({
			query: (self, { blocks, segments, selectedStart, query }, event) => {
				if (!event) {
					return query
				}
				const nextQuery = event.target.value
				const filteredBlocks = filterBlocks(blocks, nextQuery)
				const keep = findBlock(filteredBlocks, selectedStart)
				const filteredSegments = filterSegments(segments, nextQuery)
				const firstSegment = keep ? firstSegmentForBlock(filteredSegments, keep.start) : filteredSegments[0]
				const firstIndex = indexOfSegment(filteredSegments, firstSegment?.start)
				self.update({
					query: nextQuery,
					selectedStart: keep?.start,
					visibleSections: Math.max(INITIAL_SECTIONS, firstIndex + INITIAL_SECTIONS),
				})
				if (self.ref.grid) {
					self.ref.grid.scrollTop = 0
				}
			},
			blockItems: (_self, { blocks, query, selectedStart }) => {
				const filtered = filterBlocks(blocks, query)
				if (filtered.length === 0) {
					return []
				}
				const items = new Array(filtered.length)
				for (let i = 0; i < filtered.length; i++) {
					const block = filtered[i]
					items[i] = BlockItem({
						...block,
						selected: selectedStart === block.start,
					})
				}
				return items
			},
			activeBlockName: (_self, { blocks, selectedStart }) => {
				const block = findBlock(blocks, selectedStart)
				return block ? block.name : "No block"
			},
			activeBlockRange: (_self, { blocks, selectedStart }) => {
				const block = findBlock(blocks, selectedStart)
				if (!block) {
					return "-"
				}
				const total = block.end - block.start + 1
				return `${toRange(block.start, block.end)} (${total} chars)`
			},
			sections: (_self, { segments, query, visibleSections }) => {
				const filtered = filterSegments(segments, query)
				if (!filtered.length) {
					return []
				}
				const count = Math.min(filtered.length, Math.max(INITIAL_SECTIONS, Math.floor(visibleSections || INITIAL_SECTIONS)))
				const items = new Array(count)
				for (let i = 0; i < count; i++) {
					const segment = filtered[i]
					items[i] = BlockSection({
						...segment,
						index: i,
					})
				}
				return items
			},
			status: (_self, { status }) => status,
			onGridScroll: (self, { segments, query, visibleSections, syncPaused, selectedStart }, event) => {
				if (!event?.target) {
					return
				}
				const node = event.target
				const filteredSegments = filterSegments(segments, query)
				if (node.scrollTop + node.clientHeight >= node.scrollHeight - 240) {
					if (visibleSections < filteredSegments.length) {
						self.update({ visibleSections: Math.min(filteredSegments.length, visibleSections + LOAD_STEP) })
					}
				}
				if (node.scrollTop <= 220) {
					if (visibleSections < filteredSegments.length) {
						self.update({ visibleSections: Math.min(filteredSegments.length, visibleSections + LOAD_STEP) })
					}
				}
				if (syncPaused) {
					return
				}
				const sectionNodes = node.querySelectorAll(".block-section")
				if (!sectionNodes.length) {
					return
				}
				let nearestStart = selectedStart
				let nearestDistance = Infinity
				let nearestSegmentStart
				for (let i = 0; i < sectionNodes.length; i++) {
					const section = sectionNodes[i]
					const top = section.offsetTop - node.scrollTop
					const distance = Math.abs(top)
					if (distance < nearestDistance) {
						nearestDistance = distance
						nearestStart = Number(section.getAttribute("data-block-start"))
						nearestSegmentStart = Number(section.getAttribute("data-segment-start"))
					}
				}
				if (nearestStart !== selectedStart) {
					const blockList = self.ref.blockList
					if (blockList) {
						const active = blockList.querySelector(`[data-block-start="${nearestStart}"]`)
						if (active) {
							active.scrollIntoView({ block: "nearest" })
						}
					}
					self.update({
						selectedStart: nearestStart,
						visibleSections: Math.max(visibleSections, (nearestSegmentStart || 0) + INITIAL_SECTIONS),
					})
				}
			},
		}).sub({
			SelectBlock: (self, _data, event) => {
				const nextStart = event.data.start
				const filteredSegments = filterSegments(self.data.segments, self.data.query)
				const nextSegment = firstSegmentForBlock(filteredSegments, nextStart)
				const segmentIndex = indexOfSegment(filteredSegments, nextSegment?.start)
				const needed = segmentIndex + INITIAL_SECTIONS
				self.update({
					selectedStart: nextStart,
					visibleSections: Math.max(self.data.visibleSections, needed, INITIAL_SECTIONS),
					syncPaused: true,
				})
				requestAnimationFrame(() => {
					const grid = self.ref.grid
					const blockList = self.ref.blockList
					if (!grid) {
						self.update({ syncPaused: false })
						return
					}
					const node = grid.querySelector(`[data-segment-index="${segmentIndex}"]`)
					if (node) {
						node.scrollIntoView({ block: "start", behavior: "smooth" })
					}
					if (blockList) {
						const active = blockList.querySelector(`[data-block-start="${nextStart}"]`)
						if (active) {
							active.scrollIntoView({ block: "nearest" })
						}
					}
					setTimeout(() => self.update({ syncPaused: false }), 300)
				})
			},
			CopyChar: async (self, { statusTick }, event) => {
				const char = event?.data?.char
				if (!char) {
					return
				}
				let ok = false
				try {
					if (navigator?.clipboard?.writeText) {
						await navigator.clipboard.writeText(char)
						ok = true
					}
				} catch (_error) {
					ok = false
				}
				if (!ok) {
					const t = document.createElement("textarea")
					t.value = char
					t.setAttribute("readonly", "")
					t.style.position = "absolute"
					t.style.left = "-9999px"
					document.body.appendChild(t)
					t.select()
					ok = document.execCommand("copy")
					document.body.removeChild(t)
				}
				const nextTick = statusTick + 1
				const code = event.data.code
				self.update({
					status: ok ? `Copied ${code}` : `Copy failed for ${code}`,
					statusTick: nextTick,
				})
				setTimeout(() => {
					if ((self.data?.statusTick || 0) === nextTick) {
						self.update({ status: "" })
					}
				}, 1300)
			},
		})

		UnicodeApp.new().mount("#ui")
	</script>
</body>

</html>
