<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<title>Select UI ― Color Picker (Cells)</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script type="importmap">
		{"imports": {"@./": "../src/js/" } }
	</script>
	<style>
		body {
			font-family: system-ui, sans-serif;
			padding: 20px;
			max-width: 800px;
			margin: 0 auto;
		}

		#ui {
			border: 1px solid #ddd;
			border-radius: 8px;
			padding: 16px;
			background: #fff;
		}

		.picker {
			display: flex;
			gap: 16px;
			align-items: flex-start;
			flex-wrap: wrap;
		}

		.swatch {
			width: 96px;
			height: 96px;
			border: 1px solid #222;
			border-radius: 8px;
			flex: 0 0 auto;
		}

		.channels {
			flex: 1;
			min-width: 220px;
		}

		.channel {
			margin-bottom: 10px;
		}

		.channel label {
			display: inline-block;
			min-width: 52px;
			font-weight: 600;
		}

		.channel input[type="range"] {
			width: calc(100% - 62px);
			vertical-align: middle;
		}
	</style>
</head>

<body>
	<h1>Color Picker</h1>
	<p>This app example uses shared cells and a derived value to keep RGB sliders and swatch color in sync.</p>

	<div id="ui">
	</div>

	<template id="ColorComponent">
		<div class="channel">
			<label out="label">Component</label>
			<input inout="value" type="range" min="0" max="255" />
		</div>
	</template>

	<template id="ColorPicker">
		<div class="picker">
			<div out="color" class="swatch" ref="swatch"></div>
			<div class="channels">
				<div out="red"></div>
				<div out="green"></div>
				<div out="blue"></div>
			</div>
		</div>
	</template>

	<script type="module">
		import ui from "@./select.ui.js"
		import cell, {derived} from "@./select.cells.js"

		const ColorComponent = ui("#ColorComponent").does({
			label: (self, {label}) => label,
			value: (self, {value}, event) => Math.min(255, Math.max(0, event ? value.set(event.target.value) : (value.value ?? 0))),
		})

		const ColorPicker = ui("#ColorPicker").init(() => {
			const red = cell(100);
			const green = cell(130);
			const blue = cell(10);
			const color = derived([red, green, blue], (red, green, blue) => {
				return `rgb(${red},${green},${blue})`;
			})
			return {red, green, blue, color}
		}).does({
			// TODO: If we were able to keep track of what is used, we could only
			// re-trigger the behaviors that have changed.
			red: (self, data) => ColorComponent({value: data.red, label: "Red"}),
			green: (self, {green}) => ColorComponent({value: green, label: "Green"}),
			blue: (self, {blue}) => ColorComponent({value: blue, label: "Blue"}),
			color: (self, {color}) => {
				self.ref.swatch.style.backgroundColor = color.value;
			}
		})

		ColorPicker.new().mount("#ui")
	</script>
</body>

</html>
