<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<title>Select UI ― Todo List</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script type="importmap">
		{"imports": {"@./": "../src/js/" } }
	</script>
	<style>
		body {
			font-family: system-ui, sans-serif;
			padding: 20px;
			max-width: 800px;
			margin: 0 auto;
		}

		#Todo {
			border: 1px solid #ddd;
			border-radius: 8px;
			padding: 16px;
			background: #fff;
		}

		ul {
			margin: 0;
			padding-left: 20px;
		}

		li {
			margin: 8px 0;
		}

		input {
			padding: 6px 8px;
			border: 1px solid #ccc;
			border-radius: 4px;
		}

		button {
			padding: 6px 10px;
			border: 1px solid #ccc;
			border-radius: 4px;
			background: white;
			cursor: pointer;
			margin-left: 6px;
		}

		button:hover {
			background: #f5f5f5;
		}

		a {
			margin-left: 8px;
		}
	</style>
</head>

<body>
	<h1>Todo List</h1>
	<p>This app example shows list rendering, inline editing, and child-to-parent events with <code>send()</code>.</p>

	<div id="Todo">
	</div>

	<template id="TodoItem" data-state="{edited:false}">
		<li>
			<div when="!data.edited">
				<span out="label">Placeholder</span>
				<button on:click="edit">Edit</button>
				<button on:click="remove">Remove</button>
			</div>
			<div when="data.edited">
				<input in="editedLabel" />
				<button on:click="save">Save</button>
				<a href="#" on:click="cancel">cancel</a>
			</div>
		</li>
	</template>

	<template id="TodoList">
		<ul out="items">
			<li>Empty</li>
		</ul>
		<button on:click="add">Add</button>
	</template>

	<script type="module">
		import {ui} from "@./select.ui.js"

		const TodoItem = ui("#TodoItem").does({
			label: (_self, {label}) => label,
			editedLabel: (self, data, event) => event ? self.update({editedLabel: event.target.value}) : data.editedLabel || data.label,
			save: (self, {editedLabel}, _event) => self.update({edited: false, label: editedLabel}),
			cancel: (self, _data, _event) => self.update({edited: false}),
			edit: (self, {_edited, label}, _event) => self.update({edited: true, editedLabel: label}),
			remove: (self, data, _event) => self.send("Remove", data)
		})

		const TodoList = ui("#TodoList").does({
			items: (_self, {items}) => items ? items.map(TodoItem) : [],
			add: (self, {items}, _event) => {
				self.update({items: [...(items || []), {label: `Todo ${items?.length}`}]})
			}
		}).sub({
			Remove: (self, {items}, event) =>
				self.set({items: items.filter(_ => _ !== event.data)})
		})

		TodoList.new().set({items: [{label: "Buy wine"}]}).mount("#Todo")
	</script>
</body>

</html>
