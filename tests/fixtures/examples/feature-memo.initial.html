<h1>Granular Re-rendering</h1><p>This example demonstrates that only behaviors whose data dependencies changed are re-evaluated. Check the render counts — updating one item should not affect others.</p><div id="App"><div class="App"><div class="controls"><button>Add Item</button><button>Random Update</button><button>Reset</button></div><div class="stats">5 items | 0 total behavior re-evaluations</div><div><div class="ListItem item"><span class="id">1</span><span class="value">Item 1</span><span class="render-count">1</span><button>+</button></div><div class="ListItem item"><span class="id">2</span><span class="value">Item 2</span><span class="render-count">1</span><button>+</button></div><div class="ListItem item"><span class="id">3</span><span class="value">Item 3</span><span class="render-count">1</span><button>+</button></div><div class="ListItem item"><span class="id">4</span><span class="value">Item 4</span><span class="render-count">1</span><button>+</button></div><div class="ListItem item"><span class="id">5</span><span class="value">Item 5</span><span class="render-count">1</span><button>+</button></div></div></div></div><template id="ListItem"><div class="item"><span class="id" out="id">0</span><span class="value" out="label">Item</span><span class="render-count" out="renderCount">0</span><button on:click="increment">+</button></div></template><template id="App"><div><div class="controls"><button on:click="addItem">Add Item</button><button on:click="randomUpdate">Random Update</button><button on:click="reset">Reset</button></div><div class="stats" out="stats"></div><div out="items"></div></div></template>
