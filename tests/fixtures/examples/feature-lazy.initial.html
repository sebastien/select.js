<h1>Lazy Component Loading</h1><p>This example demonstrates lazy loading a component via <code>lazy()</code>. The "heavy" component is loaded asynchronously and the parent polls for completion.</p><div id="App"><div class="App"><div class="controls"><button>Load Heavy Component</button><button>Reset</button></div><div>Click 'Load Heavy Component' to start</div></div></div><template id="App"><div><div class="controls"><button on:click="load">Load Heavy Component</button><button on:click="reset">Reset</button></div><div out="content"></div></div></template>
