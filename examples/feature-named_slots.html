<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<title>Select UI — Named Slots</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script type="importmap">
		{"imports": {"@./": "../src/js/" } }
	</script>
	<style>
		body {
			font-family: system-ui, sans-serif;
			padding: 20px;
			max-width: 800px;
			margin: 0 auto;
		}

		.card {
			border: 1px solid #ddd;
			border-radius: 8px;
			padding: 0;
			margin: 16px 0;
			overflow: hidden;
		}

		.card-header {
			background: #f8f9fa;
			padding: 12px 16px;
			border-bottom: 1px solid #eee;
			font-weight: 600;
		}

		.card-body {
			padding: 16px;
		}

		.card-footer {
			background: #f8f9fa;
			padding: 12px 16px;
			border-top: 1px solid #eee;
			font-size: 14px;
			color: #666;
		}

		.controls {
			margin-bottom: 16px;
		}

		.controls button {
			padding: 6px 12px;
			margin-right: 8px;
			border: 1px solid #ccc;
			border-radius: 4px;
			background: white;
			cursor: pointer;
		}

		.controls button:hover {
			background: #f5f5f5;
		}

		.badge {
			display: inline-block;
			padding: 2px 8px;
			border-radius: 12px;
			background: #007bff;
			color: white;
			font-size: 12px;
			margin-left: 8px;
		}
	</style>
</head>

<body>
	<h1>Named Slots</h1>
	<p>This example demonstrates both child-side <code>&lt;slot&gt;</code> and parent-side <code>slot="name"</code> content projection.</p>

	<div id="App"></div>

	<template id="Card">
		<div class="card">
			<div class="card-header">
				<slot name="header"><span>Default Header</span></slot>
			</div>
			<div class="card-body">
				<slot name="body"><p>Default body content goes here.</p></slot>
			</div>
			<div class="card-footer">
				<slot name="footer"><span>Default Footer</span></slot>
			</div>
		</div>
	</template>

	<template id="App">
		<div>
			<div class="controls">
				<button on:click="toggleMode">Toggle Mode</button>
			</div>

			<h3>Template-driven slots (slot="name" in placeholder)</h3>
			<div out="templateCard">
				<span slot="header">Custom Title <span class="badge">NEW</span></span>
				<p slot="body">This content comes from the parent's placeholder via <code>slot="body"</code>.</p>
				<span slot="footer">Custom Footer — <a href="#">Learn more</a></span>
			</div>

			<h3>JS-driven slots (data.slots)</h3>
			<div out="jsCard"></div>

			<h3>Mixed: template + JS override</h3>
			<div out="mixedCard">
				<span slot="header">Template Header</span>
				<p slot="body">Template Body</p>
			</div>

			<h3>Fallback only (no slot content provided)</h3>
			<div out="fallbackCard"></div>
		</div>
	</template>

	<script type="module">
		import { ui } from "@./select.ui.js"

		const Card = ui("#Card")

		const App = ui("#App").does({
			templateCard: (self, data) => Card(data),
			jsCard: (self, data) => Card({
				...data,
				slots: {
					header: document.createTextNode("JS-driven Header"),
					body: (() => {
						const p = document.createElement("p")
						p.textContent = "This body was provided via data.slots from JavaScript."
						return p
					})(),
					footer: document.createTextNode("JS-driven Footer")
				}
			}),
			mixedCard: (self, data) => Card({
				...data,
				slots: {
					// Override only the body; header and footer come from template
					body: (() => {
						const p = document.createElement("p")
						p.innerHTML = "<strong>JS override:</strong> This body replaced the template body."
						return p
					})()
				}
			}),
			fallbackCard: (self, data) => Card(data),
			toggleMode: (self, data) => {
				console.log("Toggle clicked")
			}
		})

		App.new().mount("#App")
	</script>
</body>

</html>
