<h1>Color Picker</h1><p>This app example uses shared cells and a derived value to keep RGB sliders and swatch color in sync.</p><div id="ui"><div class="ColorPicker picker"><div class="swatch" style="background-color: rgb(100, 130, 10, undefined, undefined);"></div><input class="native-picker" type="color"><div class="channels"><div><div class="ColorComponent channel"><label>Red</label><input type="range" min="0" max="255"><input type="text" inputmode="numeric" pattern="[0-9]*"></div></div><div><div class="ColorComponent channel"><label>Green</label><input type="range" min="0" max="255"><input type="text" inputmode="numeric" pattern="[0-9]*"></div></div><div><div class="ColorComponent channel"><label>Blue</label><input type="range" min="0" max="255"><input type="text" inputmode="numeric" pattern="[0-9]*"></div></div></div></div></div><template id="ColorComponent"><div class="channel"><label out="label">Component</label><input inout="value" type="range" min="0" max="255"><input inout="value" type="text" inputmode="numeric" pattern="[0-9]*"></div></template><template id="ColorPicker"><div class="picker"><div out="color" class="swatch" ref="swatch" on:click="pick"></div><input class="native-picker" ref="nativePicker" type="color" on:input="pickColor"><div class="channels"><div out="red"></div><div out="green"></div><div out="blue"></div></div></div></template>
