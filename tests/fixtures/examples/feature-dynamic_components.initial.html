<h1>Dynamic Components</h1><p>This example demonstrates reactive template swapping: each block can change its component type dynamically.</p><div id="Editor"><div class="Editor"><div class="editor-actions"><button>Add Heading</button><button>Add Paragraph</button><button>Add Code Block</button><button>Randomize Types</button></div><div><div class="HeadingBlock block block-heading"><span class="type-badge heading">Heading</span><h2>Introduction</h2><div class="controls"><button class="active">H</button><button>P</button><button>C</button><button>×</button></div></div><div class="ParagraphBlock block block-paragraph"><span class="type-badge paragraph">Paragraph</span><p>This is a paragraph of text that demonstrates dynamic component switching.</p><div class="controls"><button>H</button><button class="active">P</button><button>C</button><button>×</button></div></div><div class="CodeBlock block block-code"><span class="type-badge code">Code</span><pre>const x = 42;</pre><div class="controls"><button>H</button><button>P</button><button class="active">C</button><button>×</button></div></div></div></div></div><template id="HeadingBlock"><div class="block block-heading"><span class="type-badge heading">Heading</span><h2 out="text">Heading</h2><div class="controls"><button on:click="makeHeading" class="active">H</button><button on:click="makeParagraph">P</button><button on:click="makeCode">C</button><button on:click="remove">×</button></div></div></template><template id="ParagraphBlock"><div class="block block-paragraph"><span class="type-badge paragraph">Paragraph</span><p out="text">Paragraph</p><div class="controls"><button on:click="makeHeading">H</button><button on:click="makeParagraph" class="active">P</button><button on:click="makeCode">C</button><button on:click="remove">×</button></div></div></template><template id="CodeBlock"><div class="block block-code"><span class="type-badge code">Code</span><pre out="text">code</pre><div class="controls"><button on:click="makeHeading">H</button><button on:click="makeParagraph">P</button><button on:click="makeCode" class="active">C</button><button on:click="remove">×</button></div></div></template><template id="Editor"><div><div class="editor-actions"><button on:click="addHeading">Add Heading</button><button on:click="addParagraph">Add Paragraph</button><button on:click="addCode">Add Code Block</button><button on:click="randomize">Randomize Types</button></div><div out="blocks"></div></div></template>
