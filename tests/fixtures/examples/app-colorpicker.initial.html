<h1>Color Picker</h1><p>This app example uses shared cells and a derived value to keep RGB sliders and swatch color in sync.</p><div id="ui"><div class="ColorPicker picker"><div class="swatch" style="background-color: rgb(100, 130, 10);"></div><input class="native-picker" type="color"><div class="channels"><div><div class="ColorComponent channel"><label><span>Red</span><input type="range" min="0" max="255"></label><input type="number" min="0" max="255" step="1" inputmode="numeric"></div></div><div><div class="ColorComponent channel"><label><span>Green</span><input type="range" min="0" max="255"></label><input type="number" min="0" max="255" step="1" inputmode="numeric"></div></div><div><div class="ColorComponent channel"><label><span>Blue</span><input type="range" min="0" max="255"></label><input type="number" min="0" max="255" step="1" inputmode="numeric"></div></div></div></div></div><template id="ColorComponent"><div class="channel"><label><span out="label">Component</span><input inout="value" type="range" min="0" max="255"></label><input inout="value" type="number" min="0" max="255" step="1" inputmode="numeric"></div></template><template id="ColorPicker"><div class="picker"><div out="color" class="swatch" ref="swatch" on:click="pick"></div><input class="native-picker" ref="nativePicker" type="color" on:input="pickColor"><div class="channels"><div out="red"></div><div out="green"></div><div out="blue"></div></div></div></template>
