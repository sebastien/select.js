<h1>Web Components</h1><p>This example registers both a Select UI custom element and a pure render-function custom element using <code>webcomponent()</code>.</p><div class="layout"><section class="panel"><h2>Select UI component</h2><x-ui-counter id="counter" title="Web Counter" count="2"></x-ui-counter><div class="controls"><button id="counter-dec">count -1 (attribute)</button><button id="counter-inc">count +1 (attribute)</button><button id="counter-title">toggle title</button></div></section><section class="panel"><h2>Pure render function component</h2><x-pure-badge id="badge" label="Ready" tone="info"></x-pure-badge><div class="controls"><button id="badge-tone">toggle tone</button><button id="badge-label">toggle label</button></div></section></div>
