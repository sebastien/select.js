<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<title>Select UI — Dynamic Components</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script type="importmap">
		{"imports": {"@./": "../src/js/" } }
	</script>
	<style>
		body {
			font-family: system-ui, sans-serif;
			padding: 20px;
			max-width: 800px;
			margin: 0 auto;
		}

		.block {
			border: 1px solid #ddd;
			padding: 12px;
			margin: 8px 0;
			border-radius: 4px;
		}

		.block-heading {
			border-left: 4px solid #007bff;
		}

		.block-paragraph {
			border-left: 4px solid #28a745;
		}

		.block-code {
			border-left: 4px solid #fd7e14;
			background: #f8f9fa;
			font-family: monospace;
		}

		.controls {
			display: flex;
			gap: 4px;
			margin-top: 8px;
		}

		.controls button {
			padding: 4px 8px;
			border: 1px solid #ccc;
			border-radius: 3px;
			background: white;
			cursor: pointer;
			font-size: 12px;
		}

		.controls button:hover {
			background: #f0f0f0;
		}

		.controls button.active {
			background: #007bff;
			color: white;
			border-color: #007bff;
		}

		.editor-actions {
			margin-bottom: 16px;
			padding-bottom: 16px;
			border-bottom: 1px solid #eee;
		}

		.editor-actions button {
			padding: 6px 12px;
			margin-right: 8px;
			border: 1px solid #ccc;
			border-radius: 4px;
			background: white;
			cursor: pointer;
		}

		.editor-actions button:hover {
			background: #f5f5f5;
		}

		.type-badge {
			display: inline-block;
			padding: 2px 6px;
			border-radius: 3px;
			font-size: 11px;
			font-weight: bold;
			text-transform: uppercase;
			margin-bottom: 4px;
		}

		.type-badge.heading {
			background: #007bff;
			color: white;
		}

		.type-badge.paragraph {
			background: #28a745;
			color: white;
		}

		.type-badge.code {
			background: #fd7e14;
			color: white;
		}
	</style>
</head>

<body>
	<h1>Dynamic Components</h1>
	<p>This example demonstrates reactive template swapping: each block can change its component type dynamically.</p>

	<div id="Editor"></div>

	<template id="HeadingBlock">
		<div class="block block-heading">
			<span class="type-badge heading">Heading</span>
			<h2 out="text">Heading</h2>
			<div class="controls">
				<button on:click="makeHeading" class="active">H</button>
				<button on:click="makeParagraph">P</button>
				<button on:click="makeCode">C</button>
				<button on:click="remove">×</button>
			</div>
		</div>
	</template>

	<template id="ParagraphBlock">
		<div class="block block-paragraph">
			<span class="type-badge paragraph">Paragraph</span>
			<p out="text">Paragraph</p>
			<div class="controls">
				<button on:click="makeHeading">H</button>
				<button on:click="makeParagraph" class="active">P</button>
				<button on:click="makeCode">C</button>
				<button on:click="remove">×</button>
			</div>
		</div>
	</template>

	<template id="CodeBlock">
		<div class="block block-code">
			<span class="type-badge code">Code</span>
			<pre out="text">code</pre>
			<div class="controls">
				<button on:click="makeHeading">H</button>
				<button on:click="makeParagraph">P</button>
				<button on:click="makeCode" class="active">C</button>
				<button on:click="remove">×</button>
			</div>
		</div>
	</template>

	<template id="Editor">
		<div>
			<div class="editor-actions">
				<button on:click="addHeading">Add Heading</button>
				<button on:click="addParagraph">Add Paragraph</button>
				<button on:click="addCode">Add Code Block</button>
				<button on:click="randomize">Randomize Types</button>
			</div>
			<div out="blocks"></div>
		</div>
	</template>

	<script type="module">
		import { Dynamic, ui } from "@./select.ui.js"

		const HeadingBlock = ui("#HeadingBlock").does({
			text: (_self, { text }) => text,
			makeHeading: (self, data) => self.send("ChangeType", { ...data, blockType: "heading" }),
			makeParagraph: (self, data) => self.send("ChangeType", { ...data, blockType: "paragraph" }),
			makeCode: (self, data) => self.send("ChangeType", { ...data, blockType: "code" }),
			remove: (self, data) => self.send("Remove", data),
		})

		const ParagraphBlock = ui("#ParagraphBlock").does({
			text: (_self, { text }) => text,
			makeHeading: (self, data) => self.send("ChangeType", { ...data, blockType: "heading" }),
			makeParagraph: (self, data) => self.send("ChangeType", { ...data, blockType: "paragraph" }),
			makeCode: (self, data) => self.send("ChangeType", { ...data, blockType: "code" }),
			remove: (self, data) => self.send("Remove", data),
		})

		const CodeBlock = ui("#CodeBlock").does({
			text: (_self, { text }) => text,
			makeHeading: (self, data) => self.send("ChangeType", { ...data, blockType: "heading" }),
			makeParagraph: (self, data) => self.send("ChangeType", { ...data, blockType: "paragraph" }),
			makeCode: (self, data) => self.send("ChangeType", { ...data, blockType: "code" }),
			remove: (self, data) => self.send("Remove", data),
		})

		ui.register("heading", HeadingBlock)
			.register("paragraph", ParagraphBlock)
			.register("code", CodeBlock)

		const blockFor = (data) => Dynamic(data.blockType, data)

		const Editor = ui("#Editor").does({
			blocks: (_self, { blocks }) => blocks ? blocks.map(blockFor) : [],
			addHeading: (self, { blocks }) => {
				const b = blocks || []
				self.update({ blocks: [...b, { id: Date.now(), blockType: "heading", text: `Heading ${b.length + 1}` }] })
			},
			addParagraph: (self, { blocks }) => {
				const b = blocks || []
				self.update({ blocks: [...b, { id: Date.now(), blockType: "paragraph", text: `Paragraph ${b.length + 1}` }] })
			},
			addCode: (self, { blocks }) => {
				const b = blocks || []
				self.update({ blocks: [...b, { id: Date.now(), blockType: "code", text: `console.log("Block ${b.length + 1}");` }] })
			},
			randomize: (self, { blocks }) => {
				if (!blocks) return
				const types = ["heading", "paragraph", "code"]
				self.update({
					blocks: blocks.map(b => ({
						...b,
						blockType: types[Math.floor(Math.random() * types.length)]
					}))
				})
			}
		}).sub({
			ChangeType: (self, { blocks }, event) => {
				self.update({
					blocks: blocks.map(b =>
						b.id === event.data.id ? { ...b, blockType: event.data.blockType } : b
					)
				})
			},
			Remove: (self, { blocks }, event) => {
				self.update({ blocks: blocks.filter(b => b.id !== event.data.id) })
			}
		})

		Editor.new().set({
			blocks: [
				{ id: 1, blockType: "heading", text: "Introduction" },
				{ id: 2, blockType: "paragraph", text: "This is a paragraph of text that demonstrates dynamic component switching." },
				{ id: 3, blockType: "code", text: "const x = 42;" }
			]
		}).mount("#Editor")
	</script>
</body>

</html>
