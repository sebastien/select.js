<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8" />
	<title>Select UI — Scoped Events</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script type="importmap">
		{"imports": {"@./": "../src/js/" } }
	</script>
	<style>
		body {
			font-family: system-ui, sans-serif;
			padding: 20px;
			max-width: 800px;
			margin: 0 auto;
		}

		.event-log {
			border: 1px solid #ddd;
			border-radius: 4px;
			padding: 12px;
			background: #f8f9fa;
			font-family: monospace;
			font-size: 13px;
			min-height: 120px;
			max-height: 240px;
			overflow-y: auto;
		}

		.event-log .entry {
			padding: 2px 0;
			border-bottom: 1px solid #eee;
		}

		.event-log .entry:last-child {
			border-bottom: none;
		}

		.counter {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 8px 12px;
			border: 1px solid #ddd;
			border-radius: 4px;
			margin: 4px;
		}

		.counter button {
			padding: 4px 8px;
			border: 1px solid #ccc;
			border-radius: 3px;
			background: white;
			cursor: pointer;
		}

		.counter button:hover {
			background: #f0f0f0;
		}

		.counter .value {
			font-weight: bold;
			min-width: 24px;
			text-align: center;
		}

		.controls {
			margin: 16px 0;
		}

		.controls button {
			padding: 6px 12px;
			margin-right: 8px;
			border: 1px solid #ccc;
			border-radius: 4px;
			background: white;
			cursor: pointer;
		}

		.controls button:hover {
			background: #f5f5f5;
		}
	</style>
</head>

<body>
	<h1>Scoped Events</h1>
	<p>This example demonstrates <code>emit()</code>, <code>on()</code>, and <code>off()</code> for runtime event subscriptions alongside template-time <code>.sub()</code>.</p>

	<div id="App"></div>

	<template id="Counter">
		<div class="counter">
			<button on:click="decrement">−</button>
			<span class="value" out="count">0</span>
			<button on:click="increment">+</button>
		</div>
	</template>

	<template id="App">
		<div>
			<div class="controls">
				<button on:click="addCounter">Add Counter</button>
				<button on:click="clearLog">Clear Log</button>
			</div>
			<div out="counters"></div>
			<h3>Event Log</h3>
			<div class="event-log" out="log"></div>
		</div>
	</template>

	<script type="module">
		import { ui } from "@./select.ui.js"

		const Counter = ui("#Counter").does({
			count: (_self, { count }) => count,
			increment: (self, { count, id }) => {
				self.emit("CountChanged", { id, count: count + 1, action: "increment" })
			},
			decrement: (self, { count, id }) => {
				self.emit("CountChanged", { id, count: count - 1, action: "decrement" })
			}
		})

		const App = ui("#App").does({
			counters: (_self, { counters }) => counters ? counters.map((c) => Counter(c)) : [],
			addCounter: (self, { counters }) => {
				const next = (counters || []).length + 1
				self.update({ counters: [...(counters || []), { id: next, count: 0 }] })
			},
			clearLog: (self, _data) => {
				self.update({ log: [] })
			}
		}).sub({
			// Template-time subscription
			CountChanged: (self, data, event) => {
				self.update({
					counters: data.counters.map(c =>
						c.id === event.data.id ? { ...c, count: event.data.count } : c
					),
					log: [...(data.log || []), `[template] Counter #${event.data.id} ${event.data.action}ed to ${event.data.count}`]
				})
				return event.stopPropagation()
			}
		})

		const app = App.new().set({
			counters: [
				{ id: 1, count: 5 },
				{ id: 2, count: 3 }
			],
			log: []
		}).mount("#App")

		// Runtime subscription example
		app.on("CountChanged", (_self, _data, event) => {
			console.log("Runtime handler:", event.data)
		})
	</script>
</body>

</html>
