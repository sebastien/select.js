<h1>Icons: direct Iconify collections</h1><p class="muted">This example demonstrates live icon updates powered by <code>ui(...)</code> and <code>cell(...)</code>, using direct CDN/Iconify sources only.</p><div id="ui"></div><template id="App"><div class="layout"><section class="panel"><h2>Controls (live)</h2><div class="controls"><label> Icon family (source) <select out:value="source" on:change="setSource"><option value="lucide">lucide</option><option value="tabler">tabler</option><option value="mdi">mdi</option><option value="material-symbols">material-symbols</option></select></label><label> Icon name <input inout="name" placeholder="home"></label><label> Size <select out:value="size" on:change="setSize"><option value="1em">1em</option><option value="1.5em">1.5em</option><option value="2em">2em</option><option value="32px">32px</option></select></label></div></section><section class="panel showcase"><article class="preview"><h3>Programmatic <code>icon(...)</code></h3><div out="programmatic" class="icon-row"></div><div class="muted">Uses <code>icon(name, { source, size })</code>.</div></article><article class="preview"><h3>Default catalog <code>&lt;ui-icon&gt;</code></h3><div class="icon-row"><ui-icon out:icon="qualified" out:size="size"></ui-icon><span out="qualified"></span></div><div class="muted">No explicit <code>sources</code> passed. Collections are fetched from CDN.</div></article><article class="preview"><h3>Explicit source <code>&lt;ui-icon-cdn&gt;</code></h3><div class="icon-row"><ui-icon-cdn out:icon="qualified" out:size="size"></ui-icon-cdn><span out="qualified"></span></div><div class="muted">Uses <code>install("ui-icon-cdn", { source: "https://api.iconify.design" })</code>.</div></article></section><section class="panel"><h2>Quick picks</h2><div class="swatches"><button on:click="pickSparkles">lucide:sparkles</button><button on:click="pickAlien">tabler:alien</button><button on:click="pickAccount">mdi:account</button><button on:click="pickSchedule">material-symbols:schedule</button></div></section></div></template>
