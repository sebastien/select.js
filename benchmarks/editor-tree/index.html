<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Editor Tree Benchmark</title>
	<link rel="stylesheet" href="../../src/css/ui.css" type="text/css" media="all" />
	<style>
		body {
			padding: 1rem;
		}

		pre {
			white-space: pre-wrap;
		}
	</style>
</head>

<body>
	<h1 class="h4">Editor Tree Benchmark</h1>
	<p class="small dim">Framework: <span id="Framework">loading...</span></p>
	<div id="BenchmarkRoot"></div>
	<pre id="Output"></pre>

	<script type="module">
		import { createBenchmarkRunner, formatBenchmarkResult } from "./runner.js";

		const params = new URLSearchParams(window.location.search);
		const framework = params.get("framework") || "ui";
		const supported = new Set(["solidjs", "ui"]);
		if (!supported.has(framework)) {
			throw new Error(`Unsupported framework "${framework}"`);
		}

		document.getElementById("Framework").textContent = framework;
		const module = await import(`./frameworks/${framework}.js`);

		const runner = createBenchmarkRunner({
			framework,
			root: document.getElementById("BenchmarkRoot"),
			createApp: module.createApp,
		});
		const output = document.getElementById("Output");

		window.runEditorTreeBenchmark = async (options = {}) => {
			const result = await runner.run(options);
			output.textContent = formatBenchmarkResult(result);
			return result;
		};

		output.textContent = "Ready";
		if (params.get("autorun") === "1") {
			await window.runEditorTreeBenchmark();
		}
	</script>
</body>

</html>
